paths:
  data_root: data_paper
  models_root: models_paper

audio:
  sample_rate: 4000
  duration_seconds: 5.0
  trim_top_db: 30
  n_mels: 128
  n_fft: 512
  hop_length: 128
  fmin: 50
  fmax: 2000
  use_deltas: true

train:
  seed: 42
  batch_size: 24
  epochs: 45
  learning_rate: 0.0005
  label_smoothing: 0.03
  architecture: efficientnetb0
  dropout: 0.35
  dense_units: 256
  freeze_backbone: false
  model_name: respiratory_classifier_paper

app:
  host: 0.0.0.0
  port: 8080
  allowed_extensions:
    - .wav
    - .mp3
    - .flac
    - .ogg
    - .m4a
