paths:
  data_root: dataset_final_gap_augmented
  models_root: models_strong_cnn_gap_augmented

audio:
  sample_rate: 4000
  duration_seconds: 5.0
  trim_top_db: 30
  n_mels: 128
  n_fft: 512
  hop_length: 128
  fmin: 50
  fmax: 2000
  use_deltas: true

train:
  seed: 42
  batch_size: 16
  epochs: 40
  learning_rate: 0.0001
  label_smoothing: 0.0
  architecture: strong_cnn
  dropout: 0.35
  dense_units: 256
  freeze_backbone: false
  model_name: respiratory_classifier_strong_cnn_gap_augmented
  class_weight_strategy: sqrt_balanced_clipped
  class_weight_min: 0.5
  class_weight_max: 2.0
  online_augmentation: false

inference:
  aggregation: mean_probability
  window_overlap: 0.5
  max_windows: 5

app:
  host: 0.0.0.0
  port: 8080
  allowed_extensions:
    - .wav
    - .mp3
    - .flac
    - .ogg
    - .m4a
